<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEET 2026 Countdown</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: rgba(255,255,255,0.07);
    --accent: #e8c547;
    --accent2: #ff6b4a;
    --text: #f0ede6;
    --muted: #6b6880;
    --glow: rgba(232, 197, 71, 0.15);
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Ambient background blobs */
  body::before {
    content: '';
    position: fixed;
    top: -20%;
    left: -10%;
    width: 60vw;
    height: 60vw;
    background: radial-gradient(circle, rgba(232,197,71,0.06) 0%, transparent 70%);
    pointer-events: none;
    animation: drift 12s ease-in-out infinite alternate;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -20%;
    right: -10%;
    width: 50vw;
    height: 50vw;
    background: radial-gradient(circle, rgba(255,107,74,0.05) 0%, transparent 70%);
    pointer-events: none;
    animation: drift2 15s ease-in-out infinite alternate;
  }

  @keyframes drift { from { transform: translate(0,0) scale(1); } to { transform: translate(4%,3%) scale(1.05); } }
  @keyframes drift2 { from { transform: translate(0,0) scale(1); } to { transform: translate(-3%,-4%) scale(1.08); } }

  .wrapper {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 700px;
    padding: 2rem;
    text-align: center;
  }

  /* Header badge */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(232,197,71,0.1);
    border: 1px solid rgba(232,197,71,0.25);
    color: var(--accent);
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 6px 14px;
    border-radius: 100px;
    margin-bottom: 1.5rem;
    animation: fadeDown 0.8s ease both;
  }
  .badge-dot {
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
    animation: pulse 2s ease infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.7)} }

  /* Title */
  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(3.5rem, 10vw, 6.5rem);
    letter-spacing: 0.04em;
    line-height: 0.9;
    margin-bottom: 0.3rem;
    animation: fadeDown 0.9s ease both 0.1s;
  }
  h1 span.year {
    color: var(--accent);
    position: relative;
  }
  h1 span.year::after {
    content: '';
    position: absolute;
    bottom: 4px;
    left: 0; right: 0;
    height: 3px;
    background: var(--accent);
    border-radius: 2px;
    transform: scaleX(0);
    animation: underlineIn 0.6s ease forwards 1s;
  }
  @keyframes underlineIn { to { transform: scaleX(1); } }

  .subtitle {
    color: var(--muted);
    font-size: 0.85rem;
    font-weight: 300;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 3rem;
    animation: fadeDown 1s ease both 0.2s;
  }

  /* Countdown grid */
  .countdown {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1rem;
    margin-bottom: 2.5rem;
    animation: fadeUp 1s ease both 0.4s;
  }

  .unit {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.5rem 0.5rem 1.2rem;
    position: relative;
    overflow: hidden;
    transition: border-color 0.3s, transform 0.2s;
  }
  .unit:hover {
    border-color: rgba(232,197,71,0.3);
    transform: translateY(-2px);
  }
  .unit::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .unit:hover::before { opacity: 1; }

  .unit-number {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2.8rem, 6vw, 4rem);
    letter-spacing: 0.02em;
    line-height: 1;
    color: var(--text);
    display: block;
    transition: color 0.3s;
  }
  .unit:nth-child(1) .unit-number { color: var(--accent); }

  .unit-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 6px;
    display: block;
  }

  /* Progress bar */
  .progress-wrap {
    animation: fadeUp 1s ease both 0.55s;
    margin-bottom: 2rem;
  }
  .progress-meta {
    display: flex;
    justify-content: space-between;
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .progress-meta span:last-child { color: var(--accent); }
  .progress-track {
    height: 4px;
    background: var(--surface);
    border-radius: 4px;
    overflow: hidden;
    border: 1px solid var(--border);
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 4px;
    transition: width 1s ease;
    position: relative;
  }
  .progress-fill::after {
    content: '';
    position: absolute;
    right: 0; top: 0; bottom: 0;
    width: 20px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3));
    border-radius: 4px;
    animation: shimmer 2s ease infinite;
  }
  @keyframes shimmer { 0%,100%{opacity:0.5} 50%{opacity:1} }

  /* Next test card */
  .next-test {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    border-radius: 12px;
    padding: 1rem 1.4rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    animation: fadeUp 1s ease both 0.65s;
    margin-bottom: 1.5rem;
    text-align: left;
  }
  .next-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 4px;
  }
  .next-name {
    font-weight: 500;
    font-size: 0.95rem;
  }
  .next-date {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.5rem;
    color: var(--accent);
    letter-spacing: 0.05em;
    white-space: nowrap;
  }

  /* Footer */
  .footer-note {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    color: var(--muted);
    text-transform: uppercase;
    animation: fadeUp 1s ease both 0.75s;
  }
  .footer-note span { color: var(--accent2); }

  /* Animations */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Digit flip animation */
  @keyframes flip {
    0%   { transform: rotateX(0deg); }
    50%  { transform: rotateX(-90deg); opacity: 0.3; }
    100% { transform: rotateX(0deg); opacity: 1; }
  }
  .flip { animation: flip 0.4s ease; }
</style>
</head>
<body>
<div class="wrapper">

  <div class="badge">
    <span class="badge-dot"></span>
    Live Countdown
  </div>

 
  <div class="countdown">
    <div class="unit">
      <span class="unit-number" id="days">--</span>
      <span class="unit-label">Days</span>
    </div>
    <div class="unit">
      <span class="unit-number" id="hours">--</span>
      <span class="unit-label">Hours</span>
    </div>
    <div class="unit">
      <span class="unit-number" id="minutes">--</span>
      <span class="unit-label">Minutes</span>
    </div>
    <div class="unit">
      <span class="unit-number" id="seconds">--</span>
      <span class="unit-label">Seconds</span>
    </div>
  </div>

  <div class="progress-wrap">
    <div class="progress-meta">
      <span id="prep-label">Preparation Progress</span>
      <span id="pct">0%</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>
  </div>

  <div class="next-test">
    <div>
      <div class="next-label">🔵 Next Test — Plan A</div>
      <div class="next-name" id="next-name">Calculating...</div>
    </div>
    <div class="next-date" id="next-date">—</div>
  </div>

  <p class="footer-note">180 Questions &nbsp;·&nbsp; Online & Offline &nbsp;·&nbsp; <span>Session 2025–26</span></p>

</div>

<script>
  // NEET 2026 date
  const NEET_DATE = new Date('2026-05-03T06:00:00');

  // Prep start (approx. when Allen session started)
  const PREP_START = new Date('2025-07-01T00:00:00');

  // All Plan-A tests
  const tests = [
    { name: 'Plan-A Test 1 — Syllabus 1', date: new Date('2026-02-21') },
    { name: 'Plan-A Test 2 — Syllabus 2', date: new Date('2026-02-26') },
    { name: 'Plan-A Test 3 — Syllabus 3', date: new Date('2026-03-03') },
    { name: 'Plan-A Test 4 — Syllabus 4', date: new Date('2026-03-08') },
    { name: 'Plan-A Test 5 — Syllabus 5', date: new Date('2026-03-13') },
    { name: 'Plan-A Test 6 — Syllabus 6', date: new Date('2026-03-18') },
    { name: 'Plan-A Test 7 — Syl 1+2',    date: new Date('2026-03-22') },
    { name: 'Plan-A Test 8 — Syl 3+4',    date: new Date('2026-03-26') },
    { name: 'Plan-A Test 9 — AIOT',        date: new Date('2026-03-29') },
    { name: 'Plan-A Test 10 — Syl 5+6',   date: new Date('2026-04-01') },
    { name: 'Plan-A Test 11 — Syl 1+2+3', date: new Date('2026-04-05') },
    { name: 'Plan-A Test 12 — Syl 4+5+6', date: new Date('2026-04-09') },
    { name: 'Plan-A Test 13 — Full',       date: new Date('2026-04-12') },
    { name: 'Plan-A Test 14 — Full',       date: new Date('2026-04-16') },
    { name: 'Plan-A Test 15 — Allen NEET-1', date: new Date('2026-04-19') },
    { name: 'Plan-A Test 16 — Full',       date: new Date('2026-04-22') },
    { name: 'Plan-A Test 17 — Allen NEET-2', date: new Date('2026-04-26') },
    { name: 'Plan-A Test 18 — Full',       date: new Date('2026-04-29') },
  ];

  const pad = n => String(n).padStart(2, '0');

  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const fmtDate = d => `${d.getDate()} ${months[d.getMonth()]}`;

  let prevVals = {};

  function animateFlip(el) {
    el.classList.remove('flip');
    void el.offsetWidth;
    el.classList.add('flip');
  }

  function update() {
    const now = new Date();
    const diff = NEET_DATE - now;

    if (diff <= 0) {
      document.getElementById('days').textContent = '00';
      document.getElementById('hours').textContent = '00';
      document.getElementById('minutes').textContent = '00';
      document.getElementById('seconds').textContent = '00';
      return;
    }

    const d = Math.floor(diff / 86400000);
    const h = Math.floor((diff % 86400000) / 3600000);
    const m = Math.floor((diff % 3600000) / 60000);
    const s = Math.floor((diff % 60000) / 1000);

    const vals = { days: d, hours: h, minutes: m, seconds: s };
    const ids   = { days: 'days', hours: 'hours', minutes: 'minutes', seconds: 'seconds' };

    for (const key of Object.keys(vals)) {
      const el = document.getElementById(ids[key]);
      const newVal = pad(vals[key]);
      if (newVal !== prevVals[key]) {
        el.textContent = newVal;
        animateFlip(el);
        prevVals[key] = newVal;
      }
    }

    // Progress
    const total = NEET_DATE - PREP_START;
    const elapsed = now - PREP_START;
    const pct = Math.min(100, Math.max(0, Math.round((elapsed / total) * 100)));
    document.getElementById('pct').textContent = pct + '%';
    document.getElementById('progress-fill').style.width = pct + '%';

    // Next test
    const upcoming = tests.find(t => t.date > now);
    if (upcoming) {
      const daysTo = Math.ceil((upcoming.date - now) / 86400000);
      document.getElementById('next-name').textContent = upcoming.name;
      document.getElementById('next-date').textContent = `in ${daysTo}d · ${fmtDate(upcoming.date)}`;
    } else {
      document.getElementById('next-name').textContent = 'All tests completed!';
      document.getElementById('next-date').textContent = '🏆';
    }
  }

  update();
  setInterval(update, 1000);
</script>
</body>
</html>
